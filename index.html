<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>현정이의 여행 다이어리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=19">
</head>
<body>
  <!-- 배경 장식: 비눗방울 & 하트 & 반짝임 (장식용, 클릭 불가) -->
  <div class="deco-layer" aria-hidden="true">
    <span class="bubble b1"></span>
    <span class="bubble b2"></span>
    <span class="bubble b3"></span>
    <span class="bubble b4"></span>
    <span class="bubble b5"></span>
    <span class="bubble b6"></span>
    <span class="bubble b7"></span>
    <svg class="heart h1" viewBox="0 0 40 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 34 C20 34 2 20 2 10 C2 3 8 0 13 0 C17 0 20 3 20 8 C20 3 23 0 27 0 C32 0 38 3 38 10 C38 20 20 34 20 34Z" fill="currentColor"/>
    </svg>
    <svg class="heart h2" viewBox="0 0 40 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 34 C20 34 2 20 2 10 C2 3 8 0 13 0 C17 0 20 3 20 8 C20 3 23 0 27 0 C32 0 38 3 38 10 C38 20 20 34 20 34Z" fill="currentColor"/>
    </svg>
    <svg class="heart h3" viewBox="0 0 40 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 34 C20 34 2 20 2 10 C2 3 8 0 13 0 C17 0 20 3 20 8 C20 3 23 0 27 0 C32 0 38 3 38 10 C38 20 20 34 20 34Z" fill="currentColor"/>
    </svg>
    <span class="sparkle s1">✨</span>
    <span class="sparkle s2">✦</span>
    <span class="sparkle s3">✨</span>
    <span class="sparkle s4">✦</span>
  </div>

  <header class="site-nav hidden">
    <a href="#/" class="nav-brand">🧳 현정이의 여행 다이어리</a>
    <nav class="nav-links" id="navContext"></nav>
    <button id="logoutBtn" class="logout-btn hidden" type="button" title="로그아웃">🚪</button>
  </header>

  <!-- 로그인 화면: 로그인 전에는 이 화면만 보이고 나머지는 가려짐 -->
  <div id="authScreen" class="auth-screen hidden">
    <div class="auth-box">
      <h2>🧳 현정이의 여행 다이어리</h2>
      <p class="auth-sub">로그인하면 어떤 기기에서든 같은 여행 기록을 볼 수 있어요.</p>
      <form id="authForm">
        <label>이메일
          <input type="email" id="auth-email" required autocomplete="username">
        </label>
        <label>비밀번호
          <input type="password" id="auth-password" required autocomplete="current-password" minlength="6">
        </label>
        <p id="authError" class="auth-error"></p>
        <button type="submit" class="btn-primary" id="authSubmitBtn">로그인</button>
      </form>
      <button type="button" id="authToggleMode" class="auth-toggle">처음이신가요? 계정 만들기</button>
    </div>
  </div>

  <div id="app" class="hidden"></div>

  <footer class="site-footer hidden">
    <p>현정이의 여행 다이어리 · 나만의 기록장</p>
  </footer>

  <!-- BGM 플레이어 (여행지에 음악이 등록되어 있을 때만 표시) -->
  <div id="bgmPlayer" class="bgm-player hidden">
    <button id="bgmToggle" type="button" title="재생/정지">▶</button>
    <span id="bgmName" class="bgm-name"></span>
    <input type="range" id="bgmVolume" min="0" max="1" step="0.05" value="0.6" title="볼륨">
    <audio id="bgmAudio" loop></audio>
  </div>

  <!-- 저장 알림 토스트 -->
  <div id="toast" class="toast"></div>

  <!-- 여행지 추가/수정 모달 -->
  <div id="destModal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="destModalTitle">새 여행지 추가</h3>
      <form id="destForm">
        <div class="form-row-radio">
          <label class="radio-pill"><input type="radio" name="f-type" value="intl" checked> ✈️ 해외 여행</label>
          <label class="radio-pill"><input type="radio" name="f-type" value="domestic"> 🚗 국내 여행</label>
        </div>
        <label>여행지 이름
          <input type="text" id="f-name" placeholder="예: 파리" required>
        </label>
        <label>국가/지역
          <input type="text" id="f-country" placeholder="예: 프랑스">
        </label>
        <label>대표 이모지
          <input type="text" id="f-flag" placeholder="🇫🇷" maxlength="8">
        </label>
        <div class="form-row">
          <label>시작일
            <input type="date" id="f-start">
          </label>
          <label>종료일
            <input type="date" id="f-end">
          </label>
        </div>
        <label>테마 색상
          <input type="color" id="f-color" value="#cdb8ea">
        </label>
        <label>한줄 메모
          <input type="text" id="f-memo" placeholder="이 여행지에서 하고 싶은 것">
        </label>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="destCancelBtn">취소</button>
          <button type="submit" class="btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="app.js?v=20"></script>
</body>
</html>
